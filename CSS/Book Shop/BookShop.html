<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Nest</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgba(255, 228, 196, 0.913);
            margin: 0;
            padding: 0;
        }
        /* NAVBAR */
        
        nav {
            background-color: #333;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav h1 {
            color: white;
            margin: 0;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }
        
        nav ul li {
            color: white;
            cursor: pointer;
        }
        
        nav ul li:hover {
            text-decoration: underline;
        }
        /* SEARCH */
        
        .search-bar input {
            padding: 6px;
            border-radius: 5px;
            border: none;
        }
        /* BANNER */
        
        .banner {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }
        /* SECTION */
        
        .section {
            padding: 40px;
            text-align: center;
        }
        /* BOOK CARDS */
        
        .books-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 30px;
        }
        
        .book {
            background: white;
            padding: 15px;
            border-radius: 12px;
            width: 220px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .book:hover {
            transform: translateY(-5px);
        }
        
        .book img {
            border-radius: 8px;
        }
        
        .price {
            color: green;
            font-weight: bold;
        }
        
        .btn {
            margin-top: 10px;
            padding: 8px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .btn:hover {
            background-color: #555;
        }
        
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <h1>Book Nest</h1>
        <ul>
            <li>Home</li>
            <li>Categories</li>
            <li>Best Sellers</li>
            <li>Contact</li>
        </ul>
        <div class="search-bar">
            <input type="text" placeholder="Search books 🔍">
        </div>
    </nav>

    <!-- BANNER -->
    <img src="websitebanner.jpg" class="banner">

    <!-- FEATURED SECTION -->
    <div class="section">
        <h2>Featured Books</h2>

        <div class="books-container">

            <div class="book">
                <img src="tokill.jpg" height="250" width="180">
                <p><b>To Kill A Mockingbird</b></p>
                <p class="price">₹399</p>
                <button class="btn">Buy Now</button>
            </div>

            <div class="book">
                <img src="100M.jpg" height="250" width="180">
                <p><b>100 Million Dollar Offer</b></p>
                <p class="price">₹499</p>
                <button class="btn">Buy Now</button>
            </div>

            <div class="book">
                <img src="richdad.jpg" height="250" width="180">
                <p><b>Rich Dad Poor Dad</b></p>
                <p class="price">₹350</p>
                <button class="btn">Buy Now</button>
            </div>

            <div class="book">
                <img src="canthurtme.jpg" height="250" width="180">
                <p><b>Can't Hurt Me</b></p>
                <p class="price">₹450</p>
                <button class="btn">Buy Now</button>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 Book Nest | All Rights Reserved
    </footer>

</body>

</html>
