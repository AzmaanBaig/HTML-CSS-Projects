<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Something Beautiful</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            overflow-x: hidden;
            background: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #000;
            background: white;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            color: #000;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.6;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-secondary {
            background: transparent;
            color: #000;
            border: 1px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        .btn-primary {
            background: #000;
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .main-content {
            background: white;
            border-radius: 16px;
            padding: 80px 60px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 60px;
            position: relative;
            overflow: hidden;
        }

        .content-left {
            flex: 1;
            max-width: 600px;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
            color: #000;
        }

        .subtitle {
            font-size: 20px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
        }

        .btn-large {
            padding: 16px 32px;
            font-size: 16px;
        }

        .btn-blue {
            background: #0084ff;
            color: white;
        }

        .btn-blue:hover {
            background: #0073e6;
        }

        .btn-transparent {
            background: transparent;
            color: #000;
            border: 1px solid #e0e0e0;
        }

        .btn-transparent:hover {
            background: #f5f5f5;
        }

        .trusted-by {
            margin-top: 40px;
        }

        .trusted-text {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }

        .logos {
            display: flex;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
        }

        .company-logo {
            font-size: 18px;
            font-weight: 600;
            color: #666;
            opacity: 0.7;
        }

        .content-right {
            flex: 1;
            position: relative;
            min-height: 400px;
        }

        #illustrationCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        @media (max-width: 968px) {
            .main-content {
                flex-direction: column;
                padding: 60px 40px;
            }

            h1 {
                font-size: 52px;
            }

            .nav-links {
                display: none;
            }
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 42px;
            }

            .subtitle {
                font-size: 18px;
            }

            .cta-buttons {
                flex-direction: column;
            }

            .main-content {
                padding: 40px 20px;
            }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">Notion</div>
            <div class="nav-links">
                <a href="#product">Product</a>
                <a href="#teams">Teams</a>
                <a href="#templates">Templates</a>
                <a href="#customers">Customers</a>
                <a href="#pricing">Pricing</a>
            </div>
            <div class="nav-buttons">
                <a href="#" class="btn btn-secondary">Request a demo</a>
                <a href="#" class="btn btn-secondary">Log In</a>
                <a href="#" class="btn btn-primary">Get Notion free</a>
            </div>
        </nav>

        <div class="main-content">
            <div class="content-left">
                <h1>Build something beautiful.</h1>
                <p class="subtitle">Notion helps you and your team get more done with peace of mind.</p>
                
                <div class="cta-buttons">
                    <a href="#" class="btn btn-blue btn-large">Download for free</a>
                    <a href="#" class="btn btn-transparent btn-large">Request a demo</a>
                </div>

                <div class="trusted-by">
                    <p class="trusted-text">Trusted by teams at</p>
                    <div class="logos">
                        <span class="company-logo">airbnb</span>
                        <span class="company-logo">NETFLIX</span>
                        <span class="company-logo">db Deutsche</span>
                        <span class="company-logo">Figma</span>
                    </div>
                </div>
            </div>

            <div class="content-right">
                <canvas id="illustrationCanvas"></canvas>
                <div class="floating-shapes" id="floatingShapes"></div>
            </div>
        </div>
    </div>

    <script>
        // Canvas illustration
        const canvas = document.getElementById('illustrationCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            drawIllustration();
        }

        function drawIllustration() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Draw person on left
            drawPerson(centerX - 150, centerY, '#000', 'left');
            
            // Draw computer screen in middle
            drawComputer(centerX, centerY - 50);
            
            // Draw person on right
            drawPerson(centerX + 150, centerY, '#000', 'right');
            
            // Draw floating elements
            drawFloatingElements();
        }

        function drawPerson(x, y, color, side) {
            // Head
            ctx.beginPath();
            ctx.arc(x, y - 40, 20, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            
            // Body
            ctx.beginPath();
            ctx.arc(x, y + 10, 30, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            
            // Arms (animated based on side)
            const armAngle = side === 'left' ? -0.5 : 0.5;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + (side === 'left' ? -40 : 40), y - 10);
            ctx.strokeStyle = color;
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // Other arm
            ctx.beginPath();
            ctx.moveTo(x, y + 5);
            ctx.lineTo(x + (side === 'left' ? -35 : 35), y + 25);
            ctx.stroke();
            
            // Legs
            ctx.beginPath();
            ctx.moveTo(x, y + 35);
            ctx.lineTo(x - 15, y + 70);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x, y + 35);
            ctx.lineTo(x + 15, y + 70);
            ctx.stroke();
        }

        function drawComputer(x, y) {
            // Screen
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(x - 50, y - 40, 100, 80);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.strokeRect(x - 50, y - 40, 100, 80);
            
            // Screen content (window)
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 40, y - 30, 80, 60);
            
            // Window controls
            ctx.fillStyle = '#ff5f57';
            ctx.beginPath();
            ctx.arc(x - 30, y - 22, 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ffbd2e';
            ctx.beginPath();
            ctx.arc(x - 18, y - 22, 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#28ca42';
            ctx.beginPath();
            ctx.arc(x - 6, y - 22, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Content lines
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 2;
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(x - 35, y - 5 + i * 10);
                ctx.lineTo(x + 35, y - 5 + i * 10);
                ctx.stroke();
            }
            
            // Stand
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 15, y + 40, 30, 4);
            ctx.fillRect(x - 3, y + 40, 6, 15);
        }

        function drawFloatingElements() {
            const elements = [
                { x: 100, y: 80, type: 'note' },
                { x: canvas.width - 100, y: 100, type: 'checklist' },
                { x: canvas.width - 120, y: canvas.height - 100, type: 'calendar' },
                { x: 80, y: canvas.height - 80, type: 'light' }
            ];

            elements.forEach(el => {
                const offset = Math.sin(Date.now() / 1000 + el.x) * 5;
                
                if (el.type === 'note') {
                    drawNote(el.x, el.y + offset);
                } else if (el.type === 'checklist') {
                    drawChecklist(el.x, el.y + offset);
                } else if (el.type === 'calendar') {
                    drawCalendar(el.x, el.y + offset);
                } else if (el.type === 'light') {
                    drawLightBulb(el.x, el.y + offset);
                }
            });
        }

        function drawNote(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(0.2);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-20, -25, 40, 50);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(-20, -25, 40, 50);
            
            ctx.strokeStyle = '#0084ff';
            ctx.lineWidth = 1;
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(-15, -15 + i * 10);
                ctx.lineTo(15, -15 + i * 10);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawChecklist(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-20, -20, 40, 40);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(-20, -20, 40, 40);
            
            // Checkmarks
            ctx.strokeStyle = '#28ca42';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-10, -5);
            ctx.lineTo(-5, 0);
            ctx.lineTo(10, -10);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(-10, 10);
            ctx.lineTo(-5, 15);
            ctx.lineTo(10, 5);
            ctx.stroke();
            ctx.restore();
        }

        function drawCalendar(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-20, -20, 40, 40);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(-20, -20, 40, 40);
            
            ctx.fillStyle = '#ff5f57';
            ctx.fillRect(-20, -20, 40, 10);
            
            ctx.fillStyle = '#333';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('12', 0, 8);
            ctx.restore();
        }

        function drawLightBulb(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#ffbd2e';
            ctx.beginPath();
            ctx.arc(0, -5, 15, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#333';
            ctx.fillRect(-5, 10, 10, 8);
            
            // Glow effect
            ctx.fillStyle = 'rgba(255, 189, 46, 0.3)';
            ctx.beginPath();
            ctx.arc(0, -5, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // Animation loop
        function animate() {
            drawIllustration();
            requestAnimationFrame(animate);
        }

        // Initialize
        resizeCanvas();
        animate();
        window.addEventListener('resize', resizeCanvas);

        // Floating particles
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 6 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.background = ['#0084ff', '#ff5f57', '#ffbd2e', '#28ca42'][Math.floor(Math.random() * 4)];
            particle.style.opacity = Math.random() * 0.5 + 0.2;
            
            document.getElementById('floatingShapes').appendChild(particle);
            
            setTimeout(() => particle.remove(), 5000);
        }

        setInterval(createParticle, 800);
    </script>
</body>
</html>
